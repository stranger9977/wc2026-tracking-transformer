# First real-data training run — Metrica sample (2 matches, 5 Hz).
# Targets:
#   * val_loss drops well below the synthetic baseline (~0.6 with 5% positives;
#     here positives are ~40-55% so random baseline is ~0.69 — we want < 0.6).
#   * Attention weights become non-uniform on real frames.
#
# Run:
#   uv run python -m wc2026_tracking_transformer.train fit --config configs/metrica_smoke.yaml

trainer:
  accelerator: cpu
  devices: 1
  max_epochs: 5
  log_every_n_steps: 25
  enable_progress_bar: true
  enable_checkpointing: false
  logger: false

model:
  feature_len: 7
  model_dim: 64
  num_heads: 4
  num_layers: 2
  dropout: 0.1
  head_pool: mean
  head_hidden: 64
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5

data:
  source: metrica
  batch_size: 128
  num_workers: 0
  metrica_k_seconds: 10.0
  metrica_sampling_stride: 5
