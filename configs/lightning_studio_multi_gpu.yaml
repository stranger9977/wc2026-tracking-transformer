# Lightning AI Studio multi-GPU config. Defaults assume a 4 × A10G Studio;
# scale `trainer.devices` (and batch_size) as needed.
#
# Run inside a Studio:
#   uv run python -m wc2026_tracking_transformer.train fit --config configs/lightning_studio_multi_gpu.yaml

trainer:
  accelerator: gpu
  devices: 4
  strategy: ddp
  precision: bf16-mixed
  max_epochs: 200
  accumulate_grad_batches: 2
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  enable_checkpointing: true

model:
  feature_len: 7
  model_dim: 256
  num_heads: 8
  num_layers: 4
  dropout: 0.1
  head_pool: mean
  head_hidden: 256
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5

data:
  source: dfl
  batch_size: 256
  num_workers: 8
